  <!-- React mounts here — ONE root div only -->
  <div id="root"></div>

  <!-- Hide loading screen once React has painted something into #root -->
  <script>
    (function () {
      var root = document.getElementById('root');
      var loader = document.getElementById('app-loading');
      if (!root || !loader) return;

      var observer = new MutationObserver(function () {
        if (root.children.length > 0) {
          loader.classList.add('hidden');
          setTimeout(function () {
            if (loader.parentNode) loader.parentNode.removeChild(loader);
          }, 400);
          observer.disconnect();
        }
      });

      observer.observe(root, { childList: true, subtree: false });

      // Safety fallback — remove loader after 8 seconds no matter what
      setTimeout(function () {
        if (loader.parentNode) {
          loader.classList.add('hidden');
          setTimeout(function () {
            if (loader.parentNode) loader.parentNode.removeChild(loader);
          }, 400);
        }
        observer.disconnect();
      }, 8000);
    })();
  </script>
